/**:
  ros__parameters:
    use_sim_time: false

    wait_for_inputs_sec: 2.0
    tf_lookup_timeout_sec: 2.0

    # Intrinsicsm (from /pursuer/camera/depth/camera_info)
    image_width: 480
    image_height: 270
    fx: 236.74095153808594
    fy: 236.74095153808594
    cx: 242.04794311523438
    cy: 132.5838623046875

    voxel_resolution_m: 0.01

voxel_map_node:
  ros__parameters:
    target_frame: "target/base_link"
    camera_frame: "pursuer/camera_depth_optical_frame"
    input_points_topic: "/target/points"
    # IMPORTANT: this must match the token stamp exactly
    input_step_stamp_topic: "/experiment/captured_cloud_stamp"
    use_cam_pose_topic: true
    input_cam_pose_topic: "/experiment/captured_cam_pose"
    output_occupied_topic: "/nbv/voxels/occupied"
    output_frontier_topic: "/nbv/voxels/frontier"
    output_bbox_topic: "/nbv/voxels/bbox"
    update_service: "/nbv/update/voxels"
    cloud_buf_max: 50
    pose_buf_max: 50
    # Map params (tune as needed)
    bbx_half_side_m: 0.3
    bbx_z_min_m: 0.02
    bbx_z_max_m: 0.6
    ray_stride_px: 4
    point_stride: 1
    max_ray_range_m: 2.0
    max_steps_per_ray: 50

ring_generator_node:
  ros__parameters:
    world_frame: "world"
    base_frame: "pursuer/base_link"
    camera_frame: "pursuer/camera_link"
    optical_frame: "pursuer/camera_depth_optical_frame"
    target_source: "tf"
    target_frame: "target/base_link"
    # Testbed: always use latest TF (avoid token-time extrapolation).
    use_latest_tf: true
    # Static testbed: keep candidates within reachable distance of current robot.
    enable_reachability_in_tf_mode: true
    reachability_max_dist_m: 1.9
    input_step_stamp_topic: "/experiment/step_stamp"
    output_optical_topic: "/nbv/candidates_world_optical"
    output_base_topic: "/nbv/candidates_world_base"
    service_name: "/nbv/generate/candidates"
    num_candidates: 14
    base_height_m: 0.0
    v_min: 0.05
    r_off_m: 1.1
    candidate_mode: "ring"

score_node:
  ros__parameters:
    input_step_stamp_topic: "/experiment/step_stamp"
    static_target: true
    target_frame: "target/base_link"
    # Testbed: always use latest TF (avoid token-time extrapolation).
    use_latest_tf: true
    input_candidates_topic: "/nbv/candidates_world_optical"
    input_frontier_topic: "/nbv/voxels/frontier"
    input_occupied_topic: "/nbv/voxels/occupied"
    output_scores_topic: "/nbv/scores"
    output_best_index_topic: "/nbv/best_index"
    output_best_candidate_topic: "/nbv/best_candidate"
    output_proj_img_topic: "/nbv/debug/projection_image"
    output_ring_img_topic: "/nbv/debug/score_ring_image"
    score_service: "/nbv/generate/scores"
    require_new_inputs: true
    min_cluster_pts: 5
    max_points_per_cluster: 500
    # GMM
    min_gmm_cluster_num: 5
    max_gmm_cluster_num: 15
    gmm_max_iters: 100
    gmm_term_eps: 1e-3
    gmm_use_bic: true
    gmm_max_points: 20000
    # Scoring
    cgal_eps: 0.01
    depth_decay: 0.5
    # Monte Carlo (kept aligned with simulation static config; may be ignored in static_target mode)
    use_monte_carlo: false
    mc_num_samples: 10
    mc_seed: 42
    # Debug
    debug_save_projection_png: true
    debug_save_all_candidates: true
    debug_dir: "debug/mua_nbv_planner"
    debug_group_by_run_id: false
    run_id_topic: "/experiment/run_id"
