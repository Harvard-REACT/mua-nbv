# Clock
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Pointcloud
- ros_topic_name: "/pursuer/camera/depth/color/points"
  gz_topic_name: "/pursuer/camera/depth/color/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS

# World pose
- ros_topic_name: "/world/sim_world/pose/info"
  gz_topic_name: "/world/sim_world/pose/info"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

# Pursuer pose
- ros_topic_name: "/sim/pursuer/pose"
  gz_topic_name: "/model/pursuer/pose"
  ros_type_name: "geometry_msgs/msg/PoseStamped"
  gz_type_name: "gz.msgs.Pose"
  direction: GZ_TO_ROS

# Target pose
- ros_topic_name: "/sim/target/pose"
  gz_topic_name: "/model/target/pose"
  ros_type_name: "geometry_msgs/msg/PoseStamped"
  gz_type_name: "gz.msgs.Pose"
  direction: GZ_TO_ROS